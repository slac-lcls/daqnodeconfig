# This playbook updates the driver on the nodes. It should be run if datadev.service is already installed
# otherwise run files_update.yml instead.
# The playbook checks for the presence of the service file and only proceeds with the driver update if it exists.

# how to run the script
# ansible-playbook driver_update.yml -K -e host='TMO_hsd_drp RIX_hsd_drp XPP_hsd_drp' -e driver='6.9.0'

# RM 2026-03-11: Initial version
# RM 2026-04-03: Claude proofed
---
- hosts: "{{ host }}"
  gather_facts: true
  become: true
  ignore_errors: yes

  vars:
    linux_repo: "{{ ansible_distribution | lower }}"
    linux_version: "{{ ansible_distribution_version }}"
    src: '/cds/home/p/psrel/ansible_files/datadev/datadev.ko_{{ driver }}_{{ linux_repo }}_{{ linux_version }}'
    dest: '/usr/local/sbin/datadev.ko'
    mode: '0755'

  pre_tasks:
    - name: Assert required extra variables are defined
      ansible.builtin.assert:
        that:
          - host is defined and host | length > 0
          - driver is defined and driver | length > 0
        fail_msg: >
          Both 'host' and 'driver' must be supplied as
          extra variables (-e "host=... driver=...").

    - name: Check that the source driver file exists on the controller
      ansible.builtin.stat:
        path: "{{ src }}"
      register: src_stat
      delegate_to: localhost

    - name: Fail if the source driver file is missing
      ansible.builtin.fail:
        msg: >
          Source file '{{ src }}' not found on the Ansible controller.
          Detected distro: {{ ansible_distribution }} {{ ansible_distribution_version }}.
      when: not src_stat.stat.exists

    - name: Get service status                        
        ansible.builtin.stat:
        path: /etc/systemd/system/datadev.service
      register: service_file_status

    - name: Fail if the service file is not present
      ansible.builtin.fail:
        msg: "datadev.service not found. Please run files_update.yml instead."
      when: not service_file_status.stat.exists

  tasks:
    - name: Initial message
      ansible.builtin.debug:
        msg: "Starting driver update for {{ inventory_hostname }} with driver {{ driver }}"

    - name: load files
      ignore_errors: true
      ansible.builtin.copy:                           
        src: "{{ src }}"
        dest: "{{ dest }}"
        mode: "{{ mode }}"
        backup: true
      register: artifacts_copy_status
      notify: install drivers

  handlers:
    - name: install drivers
      ignore_errors: true
                                                      
      ansible.builtin.shell: |
        rmmod datadev 2>/dev/null || true
        systemctl daemon-reload
        systemctl start datadev.service
        systemctl enable datadev.service